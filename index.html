<!DOCTYPE html>
<html>
<head>
  <title>Book Scout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body style="font-family: Arial; padding:20px;">
  <h1>📚 Book Scout</h1>

  <input type="text" id="isbn" placeholder="Scan or enter ISBN"
    style="width:100%;padding:12px;font-size:18px;">

  <button onclick="lookupBook()" style="width:100%;padding:12px;margin-top:10px;">Search</button>

  <button onclick="startScanner()" style="width:100%;padding:12px;margin-top:10px;background:#4CAF50;color:white;border:none;">
    Scan Barcode
  </button>

  <button onclick="stopScanner()" style="width:100%;padding:12px;margin-top:10px;background:#999;color:white;border:none;">
    Stop Scanner
  </button>

  <div id="reader" style="width:100%;margin-top:20px;"></div>
  <div id="result" style="margin-top:20px;"></div>

  <hr style="margin:30px 0;">

  <h2>Kept Books</h2>
  <button onclick="exportCSV()" style="width:100%;padding:12px;background:#222;color:white;border:none;">
    Export CSV
  </button>

  <div id="log" style="margin-top:20px;"></div>

<script>
let html5QrCode;
let currentBook = null;
let keptBooks = JSON.parse(localStorage.getItem("keptBooks")) || [];

renderLog();

async function startScanner() {
  document.getElementById("reader").innerHTML = "";
  html5QrCode = new Html5Qrcode("reader");

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      {
  fps: 15,
  qrbox: { width: 300, height: 120 }
},
      async (decodedText) => {
  const isbn = decodedText.replace(/[^0-9]/g, "");

  // Only accept real ISBN-13 barcodes
  if (
    isbn.length === 13 &&
    (isbn.startsWith("978") || isbn.startsWith("979"))
  ) {
    document.getElementById("isbn").value = isbn;
    await stopScanner();
    lookupBook();
  }
}
    );
  } catch {
    alert("Camera could not start. Allow camera permission.");
  }
}

async function stopScanner() {
  if (html5QrCode) {
    try {
      await html5QrCode.stop();
      await html5QrCode.clear();
    } catch {}
  }
}

async function lookupBook() {
  let isbn = document.getElementById("isbn").value.replace(/[^0-9Xx]/g, "");
  const result = document.getElementById("result");
  result.innerHTML = "Searching...";
  currentBook = null;

  try {
    const googleResponse = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
    const googleData = await googleResponse.json();

    if (googleData.totalItems > 0) {
      const book = googleData.items[0].volumeInfo;
      showBook({
        isbn,
        title: book.title || "No title found",
        author: book.authors?.join(", ") || "Unknown",
        source: "Google Books",
        cover: book.imageLinks?.thumbnail || `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`
      });
      return;
    }

    const openResponse = await fetch(`https://openlibrary.org/isbn/${isbn}.json`);

    if (openResponse.ok) {
      const openData = await openResponse.json();

      let author = "Unknown";
      if (openData.authors && openData.authors.length > 0) {
        const authorKey = openData.authors[0].key;
        const authorResponse = await fetch(`https://openlibrary.org${authorKey}.json`);
        if (authorResponse.ok) {
          const authorData = await authorResponse.json();
          author = authorData.name || "Unknown";
        }
      }

      showBook({
        isbn,
        title: openData.title || "No title found",
        author,
        source: "Open Library",
        cover: `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`
      });
      return;
    }

    result.innerHTML = "No book found";
  } catch {
    result.innerHTML = "Search error. Try again.";
  }
}

function showBook(book) {
  currentBook = book;

  document.getElementById("result").innerHTML = `
    ${book.cover ? `<img src="${book.cover}" style="max-width:150px;margin-bottom:10px;">` : ""}
    <h2>${book.title}</h2>
    <p><strong>Author:</strong> ${book.author}</p>
    <p><strong>ISBN:</strong> ${book.isbn}</p>
    <p><strong>Source:</strong> ${book.source}</p>

    <button onclick="keepBook()" style="width:100%;padding:14px;margin-top:15px;background:#1f9d55;color:white;border:none;font-size:18px;">
      KEEP
    </button>

    <button onclick="skipBook()" style="width:100%;padding:14px;margin-top:10px;background:#d9534f;color:white;border:none;font-size:18px;">
      SKIP
    </button>
  `;
}

function keepBook() {
  if (!currentBook) return;

  keptBooks.push({
    isbn: currentBook.isbn,
    title: currentBook.title,
    author: currentBook.author,
    cover: currentBook.cover,
    date: new Date().toLocaleString()
  });

  localStorage.setItem("keptBooks", JSON.stringify(keptBooks));
  renderLog();
  document.getElementById("result").innerHTML = "Saved to kept books.";
  document.getElementById("isbn").value = "";
}

function skipBook() {
  document.getElementById("result").innerHTML = "Skipped.";
  document.getElementById("isbn").value = "";
  currentBook = null;
}

function removeBook(index) {
  keptBooks.splice(index, 1);
  localStorage.setItem("keptBooks", JSON.stringify(keptBooks));
  renderLog();
}

function renderLog() {
  const log = document.getElementById("log");

  if (keptBooks.length === 0) {
    log.innerHTML = "<p>No kept books yet.</p>";
    return;
  }

  log.innerHTML = keptBooks.map((book, index) => `
    <div style="border:1px solid #ddd;padding:10px;margin-bottom:10px;display:flex;gap:10px;">
      ${book.cover ? `<img src="${book.cover}" style="width:70px;height:auto;">` : ""}
      <div>
        <strong>${index + 1}. ${book.title}</strong><br>
        ISBN: ${book.isbn}<br>
        Author: ${book.author}<br>
        Saved: ${book.date}<br>
        <button onclick="removeBook(${index})" style="margin-top:8px;background:#d9534f;color:white;border:none;padding:8px;">
          Remove
        </button>
      </div>
    </div>
  `).join("");
}

function exportCSV() {
  if (keptBooks.length === 0) {
    alert("No kept books to export.");
    return;
  }

  let csv = "ISBN,Title,Author,Date,Cover\n";

  keptBooks.forEach(book => {
    csv += `"${book.isbn}","${book.title}","${book.author}","${book.date}","${book.cover}"\n`;
  });

  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "book-scout-kept-books.csv";
  a.click();
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
